<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless Web Application on AWS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Serverless Web Application on AWS</h1>

    <p>Employee Management System using AWS Lambda, API Gateway, DynamoDB, and Amazon S3.</p>

    <h2>Employee Details</h2>

    <form id="employeeForm">
        <input type="text" id="name" placeholder="Employee Name" required><br><br>

        <input type="email" id="email" placeholder="Employee Email" required><br><br>

        <button type="submit">Add Employee</button>
    </form>

    <hr>

    <button id="loadEmployees">View Employees</button>

    <div id="employeeList"></div>

    <script src="script.js"></script>

</body>
</html>
